<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodfy Admin - Donors</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-red: #c62828;
            --primary-red-dark: #b71c1c;
            --bg-dark-primary: #121212;
            --glass-bg: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --font-family: 'Poppins', sans-serif;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            display: flex;
            background-color: var(--bg-dark-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 15px;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        .sidebar-header .logo {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary-red);
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 15px 0;
        }

        .sidebar-nav ul li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            font-size: 1rem;
            padding: 16px 30px;
            margin: 6px 15px;
            border-radius: 10px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .sidebar-nav ul li a i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-nav ul li a:hover,
        .sidebar-nav ul li.active a {
            background-color: var(--primary-red);
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .main-content {
            flex-grow: 1;
            width: calc(100% - var(--sidebar-width));
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h2 {
            font-weight: 600;
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .search-bar {
            position: relative;
        }

        .search-bar input {
            width: 350px;
            padding: 12px 20px 12px 45px;
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 10px rgba(198, 40, 40, 0.3);
        }

        .search-bar i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .admin-profile img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
        }

        .donors-main {
            padding: 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .filter-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .filter-select {
            padding: 10px 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .widget {
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            padding: 30px;
            overflow: hidden;
        }

        .donors-table {
            width: 100%;
            border-collapse: collapse;
        }

        .donors-table th {
            text-align: left;
            padding: 15px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .donors-table td {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .donors-table tr:last-child td {
            border-bottom: none;
        }

        .donors-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .blood-badge {
            padding: 4px 10px;
            background: rgba(198, 40, 40, 0.15);
            color: var(--primary-red);
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-eligible {
            background: rgba(0, 200, 83, 0.15);
            color: #00C853;
        }

        .status-cooldown {
            background: rgba(255, 171, 0, 0.15);
            color: #FFAB00;
        }

        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
        }

        .btn-action:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
            background: rgba(198, 40, 40, 0.05);
        }

        .btn-action.view:hover {
            border-color: #2962FF;
            color: #2962FF;
            background: rgba(41, 98, 255, 0.05);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <!-- Logo removed as per user request -->
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
                <li class="active"><a href="donor.html"><i class="fa-solid fa-users"></i> Donors</a></li>
                <li><a href="patient.html"><i class="fa-solid fa-procedures"></i> Blood Requests</a></li>
                <li><a href="bloodstock.html"><i class="fa-solid fa-vials"></i> Blood Stock</a></li>
                <li><a href="staff.html"><i class="fa-solid fa-user-tie"></i> Staff</a></li>
                <li><a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
                <li><a href="emergency.html"><i class="fa-solid fa-bolt"></i> Emergency</a></li>
                <li><a href="chatbot.html"><i class="fa-solid fa-robot"></i> Chatbot</a></li>
                <li><a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="#" data-action="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </aside>

    <div class="main-content">
        <header class="header">
            <h2>Donor Management</h2>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" id="donorSearch" placeholder="Search donors by name, city, blood group...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div class="admin-profile">
                    <span class="admin-name">Admin</span> <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <main class="donors-main">
            <section class="page-header">
                <h2>Registered Donors</h2>
                <div style="display: flex; gap: 15px;">
                    <button id="btnAddDonor" class="btn-primary-shine" onclick="openAddDonorModal()"
                        style="margin-bottom: 30px; padding: 10px 20px; font-size: 0.9rem;">
                        <i class="fa-solid fa-plus"></i> Add New Donor
                    </button>
                    <div class="filter-controls">
                        <select id="bloodGroupFilter" class="filter-select">
                            <option value="">All Blood Groups</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                        <select id="eligibilityFilter" class="filter-select">
                            <option value="">All Status</option>
                            <option value="eligible">Eligible</option>
                            <option value="cooldown">On Cooldown</option>
                        </select>
                    </div>
            </section>

            <!-- Add Donor Modal -->
            <div id="addDonorModal" class="modal"
                style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; backdrop-filter:blur(5px);">
                <div class="modal-content"
                    style="background:var(--bg-dark-secondary, #1F2229); border:1px solid var(--glass-border); border-radius:16px; width:90%; max-width:600px; max-height:90vh; overflow-y:auto; box-shadow:0 25px 50px rgba(0,0,0,0.5);">
                    <div class="modal-header"
                        style="padding:24px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="color:var(--primary-red); font-size:1.5rem; margin:0;">Add New Donor</h2>
                        <button onclick="closeAddDonorModal()"
                            style="background:none; border:none; color:var(--text-primary); font-size:2rem; cursor:pointer;">&times;</button>
                    </div>
                    <form id="addDonorForm" style="padding:24px;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                            <div class="form-group">
                                <label
                                    style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">First
                                    Name *</label>
                                <input type="text" name="first_name" required class="input-field"
                                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                            </div>
                            <div class="form-group">
                                <label
                                    style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">Last
                                    Name *</label>
                                <input type="text" name="last_name" required class="input-field"
                                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                            </div>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                            <div class="form-group">
                                <label
                                    style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">Email
                                    Address *</label>
                                <input type="email" name="email" required class="input-field"
                                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                            </div>
                            <div class="form-group">
                                <label
                                    style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">Phone
                                    Number *</label>
                                <input type="text" name="phone_number" required class="input-field"
                                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                            </div>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                            <div class="form-group">
                                <label
                                    style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">Blood
                                    Group *</label>
                                <select name="blood_group" required class="input-field"
                                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                                    <option value="">Select</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label
                                    style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">City
                                    *</label>
                                <input type="text" name="city" required class="input-field"
                                    style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom:20px;">
                            <label
                                style="display:block; margin-bottom:8px; color:var(--text-secondary); font-size:0.9rem;">Password
                                (Default) *</label>
                            <input type="password" name="password" required value="donor123" class="input-field"
                                style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;">
                        </div>
                        <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:30px;">
                            <button type="button" onclick="closeAddDonorModal()"
                                style="padding:12px 24px; background:transparent; border:1px solid var(--glass-border); border-radius:8px; color:var(--text-secondary); cursor:pointer;">Cancel</button>
                            <button type="submit" class="btn-primary-shine"
                                style="padding:12px 24px; width:auto; margin-top:0;">Save Donor</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="widget">
                <table class="donors-table">
                    <thead>
                        <tr>
                            <th>Donor Name</th>
                            <th>Blood Group</th>
                            <th>Location</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="donorsTableBody">
                        <!-- Loaded via JS -->
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                                <i class="fas fa-spinner fa-spin"></i> Loading donors...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- API Configuration -->
    <script src="../../config/api-config.js"></script>

    <!-- Main Integration Script -->
    <script src="../../js/main.js"></script>

    <!-- Donor Management Script -->
    <script src="../../js/donors.js"></script>

</body>

</html>
