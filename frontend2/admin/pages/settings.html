<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodify Admin - Settings</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-red: #c62828;
            --primary-red-dark: #b71c1c;
            --bg-dark-primary: #121212;
            --bg-dark-secondary: #1E1E1E;
            --glass-bg: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --border-color: #333944;
            --success-green: #4CAF50;
            --font-family: 'Poppins', sans-serif;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            display: flex;
            background-color: var(--bg-dark-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Sidebar Standard */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 15px;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 15px 0;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav ul li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            font-size: 1rem;
            padding: 16px 30px;
            margin: 6px 15px;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-nav ul li a:hover,
        .sidebar-nav ul li.active a {
            background-color: var(--primary-red);
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 40px;
        }

        .settings-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .settings-section {
            background: var(--bg-dark-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .settings-section h2 {
            font-size: 1.4rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .settings-section h2 i {
            color: var(--primary-red);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-red);
            background: rgba(0, 0, 0, 0.3);
        }

        .btn {
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary-red);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.4);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: none;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.15);
            color: #81C784;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .alert-error {
            background: rgba(229, 57, 53, 0.15);
            color: #E57373;
            border: 1px solid rgba(229, 57, 53, 0.3);
        }

        .header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <!-- Logo removed as per user request -->
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
                <li><a href="donor.html"><i class="fa-solid fa-users"></i> Donors</a></li>
                <li><a href="patient.html"><i class="fa-solid fa-procedures"></i> Blood Requests</a></li>
                <li><a href="bloodstock.html"><i class="fa-solid fa-vials"></i> Blood Stock</a></li>
                <li><a href="staff.html"><i class="fa-solid fa-user-tie"></i> Staff</a></li>
                <li><a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
                <li><a href="emergency.html"><i class="fa-solid fa-bolt"></i> Emergency</a></li>
                <li><a href="chatbot.html"><i class="fa-solid fa-robot"></i> Chatbot</a></li>
                <li><a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
                <li class="active"><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="#" data-action="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="settings-container">
            <header class="header">
                <div>
                    <h1>Admin Settings</h1>
                    <p style="color: var(--text-secondary); margin-top: 5px;">Manage your administrative profile and
                        system preferences.</p>
                </div>
            </header>

            <div id="generalAlert" class="alert"></div>

            <!-- Profile Info Section -->
            <section class="settings-section">
                <h2><i class="fa-solid fa-user-shield"></i> Administrative Profile</h2>
                <form id="profileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="firstName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="lastName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Work Phone</label>
                            <input type="text" id="phone" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>City / Region</label>
                            <input type="text" id="city" class="form-control">
                        </div>
                        <div class="form-group full-width">
                            <label>Official Address</label>
                            <textarea id="address" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div style="margin-top: 30px;">
                        <button type="submit" class="btn btn-primary">Update Admin Profile</button>
                    </div>
                </form>
            </section>

            <!-- Password Section -->
            <section class="settings-section">
                <h2><i class="fa-solid fa-key"></i> Security Credentials</h2>
                <form id="passwordForm">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Current Admin Password</label>
                            <input type="password" id="currentPassword" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirmPassword" class="form-control" required>
                        </div>
                    </div>
                    <div style="margin-top: 30px;">
                        <button type="submit" class="btn btn-primary">Change Admin Password</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../../config/api-config.js"></script>
    <script src="../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userData = getUserData();
            if (!userData) {
                window.location.href = '../../auth/admin-login.html';
                return;
            }

            // Prefill form
            document.getElementById('firstName').value = userData.first_name || '';
            document.getElementById('lastName').value = userData.last_name || '';
            document.getElementById('phone').value = userData.phone_number || '';
            document.getElementById('city').value = userData.city || '';
            document.getElementById('address').value = userData.address || '';

            // Handle Profile Form
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                try {
                    const profileData = {
                        first_name: document.getElementById('firstName').value,
                        last_name: document.getElementById('lastName').value,
                        phone_number: document.getElementById('phone').value,
                        city: document.getElementById('city').value,
                        address: document.getElementById('address').value
                    };

                    const response = await API.users.updateProfile(profileData);

                    if (response.success) {
                        setUserData(response.data);
                        showAlert('Admin profile updated successfully!', 'success');
                    } else {
                        showAlert(response.message || 'Failed to update profile', 'error');
                    }
                } catch (err) {
                    showAlert('Network error: Could not update profile', 'error');
                }
            });

            // Handle Password Form
            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPass = document.getElementById('newPassword').value;
                const confirmPass = document.getElementById('confirmPassword').value;

                if (newPass !== confirmPass) {
                    showAlert('New passwords do not match', 'error');
                    return;
                }

                try {
                    const passData = {
                        current_password: document.getElementById('currentPassword').value,
                        new_password: newPass,
                        confirm_password: confirmPass
                    };

                    const response = await API.users.changePassword(passData);

                    if (response.success) {
                        showAlert('Admin password updated successfully!', 'success');
                        e.target.reset();
                    } else {
                        showAlert(response.message || 'Verification failed', 'error');
                    }
                } catch (err) {
                    showAlert('Error connecting to authentication service', 'error');
                }
            });

            function showAlert(msg, type) {
                const alert = document.getElementById('generalAlert');
                alert.textContent = msg;
                alert.style.display = 'block';
                alert.className = 'alert alert-' + type;

                setTimeout(() => {
                    alert.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>

</html>
