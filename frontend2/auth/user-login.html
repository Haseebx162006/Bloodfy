<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodify - Save Lives, Donate Blood</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-red: #c62828;
            --primary-red-dark: #b71c1c;
            --text-light: #ffffff;
            --text-dark: #333;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
            background: #000;
            min-height: 100vh;
        }

        /* Background Animation */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .slideshow::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .slideshow .slide {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            animation: kenBurns 10s linear infinite alternate;
        }

        .slideshow .slide.active {
            opacity: 1;
        }

        @keyframes kenBurns {
            0% {
                transform: scale(1.1) translate(0, 0);
            }

            100% {
                transform: scale(1.25) translate(-10px, 5px);
            }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-text i {
            color: var(--primary-red);
            font-size: 1.8rem;
        }

        .admin-link {
            padding: 10px 20px;
            background: var(--primary-red);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.4);
        }

        /* Main Container */
        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 100px 20px 40px;
            position: relative;
            z-index: 50;
        }

        .auth-box {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .auth-box .logo {
            width: 90px;
            height: 90px;
            margin: 30px auto 10px;
            display: block;
            border-radius: 50%;
            border: 3px solid var(--primary-red);
            box-shadow: 0 0 20px rgba(198, 40, 40, 0.5);
        }

        .auth-box h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text-light);
        }

        .auth-box .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* Form Container */
        .form-container {
            padding: 0 40px 40px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 13px 15px 13px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(198, 40, 40, 0.3);
        }

        .form-input:focus+i {
            color: var(--primary-red);
        }

        select.form-input {
            padding-left: 15px;
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3Csvg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3Cpath d='M0 0h24v24H0z' fill='none'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            appearance: none;
        }

        select.form-input option {
            background: #222;
            color: white;
        }

        textarea.form-input {
            padding: 15px;
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary-red), var(--primary-red-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(198, 40, 40, 0.5);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(25deg) translateX(-150%);
            transition: transform 0.7s ease;
        }

        .btn-submit:hover::after {
            transform: rotate(25deg) translateX(150%);
        }

        /* Switch Form */
        .switch-form {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .switch-form a {
            color: var(--primary-red);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .switch-form a:hover {
            text-decoration: underline;
            color: #ff5252;
        }

        /* Error & Success Messages */
        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .message.show {
            display: flex;
        }

        .message-error {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid #F44336;
            color: #FF5252;
        }

        .message-success {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid #4CAF50;
            color: #69F0AE;
        }

        /* Hidden Form */
        .form-hidden {
            display: none;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid var(--glass-border);
            z-index: 100;
        }

        footer a {
            color: var(--primary-red);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-box {
                max-width: 95%;
            }

            .form-container {
                padding: 0 25px 30px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            header {
                padding: 15px 20px;
            }

            footer {
                padding: 12px 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Slideshow -->
    <div class="slideshow">
        <img src="../assets/hospital.jpg.png" class="slide active" alt="Hospital">
        <img src="../assets/hero2.jpg.png" class="slide" alt="Blood Donation">
        <img src="../assets/hero3.jpg.png" class="slide" alt="Healthcare">
    </div>

    <!-- Header -->
    <header>
        <div class="logo-text">
            <i class="fas fa-hand-holding-droplet"></i>
            Bloodify
        </div>
        <a href="admin-login.html" class="admin-link">
            <i class="fas fa-user-shield"></i> Admin Login
        </a>
    </header>

    <!-- Main Authentication Container -->
    <div class="auth-wrapper">
        <div class="auth-box">
            <!-- Logo removed as per user request -->

            <!-- Login Form -->
            <div id="loginForm" class="form-container">
                <h1>Welcome Back</h1>
                <p class="subtitle">Login to your Bloodify account</p>

                <div id="loginMessage" class="message"></div>

                <form id="loginFormElement" autocomplete="off">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="loginEmail" name="email" class="form-input"
                                placeholder="Enter your email" required autocomplete="email">
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginPassword" name="password" class="form-input"
                                placeholder="Enter your password" required autocomplete="current-password">
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="switch-form">
                    Don't have an account? <a onclick="showRegisterForm()">Register as Donor</a>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="form-container form-hidden">
                <h1>Join Bloodify</h1>
                <p class="subtitle">Register as a blood donor and save lives</p>

                <div id="registerMessage" class="message"></div>

                <form id="registerFormElement" autocomplete="off">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <div class="input-wrapper">
                                <input type="text" id="firstName" name="first_name" class="form-input"
                                    placeholder="John" required autocomplete="given-name">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <div class="input-wrapper">
                                <input type="text" id="lastName" name="last_name" class="form-input" placeholder="Doe"
                                    required autocomplete="family-name">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email Address *</label>
                        <div class="input-wrapper">
                            <input type="email" id="registerEmail" name="email" class="form-input"
                                placeholder="john.doe@example.com" required autocomplete="email">
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number *</label>
                            <div class="input-wrapper">
                                <input type="tel" id="phoneNumber" name="phone_number" class="form-input"
                                    placeholder="+92 300 1234567" required autocomplete="tel">
                                <i class="fas fa-phone"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="cnic">CNIC Number *</label>
                            <div class="input-wrapper">
                                <input type="text" id="cnic" name="cnic" class="form-input"
                                    placeholder="35201-1234567-1" required>
                                <i class="fas fa-id-card"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="bloodGroup">Blood Group *</label>
                            <select id="bloodGroup" name="blood_group" class="form-input" required>
                                <option value="">Select Blood Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="dateOfBirth">Date of Birth *</label>
                            <div class="input-wrapper">
                                <input type="date" id="dateOfBirth" name="date_of_birth" class="form-input" required>
                                <i class="fas fa-calendar"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="city">City *</label>
                        <div class="input-wrapper">
                            <input type="text" id="city" name="city" class="form-input" placeholder="e.g., Lahore"
                                required>
                            <i class="fas fa-city"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Full Address</label>
                        <div class="input-wrapper">
                            <input type="text" id="address" name="address" class="form-input"
                                placeholder="Street, House, Area">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="registerPassword">Password *</label>
                            <div class="input-wrapper">
                                <input type="password" id="registerPassword" name="password" class="form-input"
                                    placeholder="Create password" required autocomplete="new-password">
                                <i class="fas fa-lock"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password *</label>
                            <div class="input-wrapper">
                                <input type="password" id="confirmPassword" name="password_confirm" class="form-input"
                                    placeholder="Confirm password" required autocomplete="new-password">
                                <i class="fas fa-lock"></i>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="registerBtn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="switch-form">
                    Already have an account? <a onclick="showLoginForm()">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <i class="fas fa-heart" style="color: var(--primary-red);"></i>
        Save Lives, Donate Blood |
        <a href="mailto:support@bloodify.com">Contact Support</a> |
        <a href="#">Privacy Policy</a>
    </footer>

    <!-- Include API Configuration & Scripts -->
    <script src="../config/api-config.js"></script>
    <script src="../js/main.js"></script>

    <script>
        // Slideshow functionality
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, 5000);

        // Form switching
        function showRegisterForm() {
            document.getElementById('loginForm').classList.add('form-hidden');
            document.getElementById('registerForm').classList.remove('form-hidden');
        }

        function showLoginForm() {
            document.getElementById('registerForm').classList.add('form-hidden');
            document.getElementById('loginForm').classList.remove('form-hidden');
        }

        // Show message helper
        function showMessage(containerId, message, type) {
            const messageEl = document.getElementById(containerId);
            messageEl.className = `message message-${type} show`;
            messageEl.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;

            if (type === 'success') {
                setTimeout(() => {
                    messageEl.classList.remove('show');
                }, 5000);
            }
        }

        // Login Form Handler
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;

            // Get form data
            const formData = new FormData(e.target);
            const email = formData.get('email');
            const password = formData.get('password');

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Logging in...';

            try {
                const result = await API.auth.login(email, password);

                if (result.success) {
                    showMessage('loginMessage', 'Login successful! Redirecting...', 'success');
                    btn.innerHTML = '<i class="fas fa-check"></i> Success!';

                    // Redirect after 1 second based on user role
                    setTimeout(() => {
                        const userData = getUserData();
                        const userType = userData?.user_type || userData?.role || '';
                        const isStaff = userData?.is_staff === true;
                        const isSuperuser = userData?.is_superuser === true;

                        // Check if user is admin/staff
                        if (userType === 'ADMIN' || userType === 'admin' || userType === 'STAFF' || isStaff || isSuperuser) {
                            window.location.href = '../admin/pages/dashboard.html';
                        } else {
                            // Regular users (donors, recipients) go to user dashboard
                            window.location.href = '../user/pages/dashboard.html';
                        }
                    }, 1000);
                }
            } catch (error) {
                console.error('Login error:', error);
                let errorMsg = 'Login failed. Please check your credentials.';

                if (error.message) {
                    errorMsg = error.message;
                } else if (error.data && error.data.message) {
                    errorMsg = error.data.message;
                }

                showMessage('loginMessage', errorMsg, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // Register Form Handler
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;

            // Get form data
            const formData = new FormData(e.target);

            // Build registration data according to backend expectations
            const registrationData = {
                email: formData.get('email'),
                first_name: formData.get('first_name'),
                last_name: formData.get('last_name'),
                phone_number: formData.get('phone_number'),
                password: formData.get('password'),
                password_confirm: formData.get('password_confirm'),
                user_type: 'donor',
                blood_group: formData.get('blood_group'),
                date_of_birth: formData.get('date_of_birth'),
                city: formData.get('city')
            };

            // Basic validation
            if (registrationData.password !== registrationData.password_confirm) {
                showMessage('registerMessage', 'Passwords do not match!', 'error');
                return;
            }

            if (registrationData.password.length < 8) {
                showMessage('registerMessage', 'Password must be at least 8 characters long!', 'error');
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating account...';

            try {
                const result = await API.auth.register(registrationData);

                if (result.success) {
                    showMessage('registerMessage', 'Account created successfully! Please login.', 'success');
                    btn.innerHTML = '<i class="fas fa-check"></i> Account Created!';

                    // Clear form
                    e.target.reset();

                    // Switch to login form after 2 seconds
                    setTimeout(() => {
                        showLoginForm();
                        showMessage('loginMessage', 'Account created! Please login with your credentials.', 'success');
                    }, 2000);
                }
            } catch (error) {
                console.error('Registration error:', error);
                let errorMsg = 'Registration failed. Please try again.';

                if (error.errors) {
                    // Show specific field errors
                    const errors = error.errors;
                    const errorMessages = Object.keys(errors).map(key => {
                        return `${key}: ${Array.isArray(errors[key]) ? errors[key].join(', ') : errors[key]}`;
                    }).join('<br>');
                    errorMsg = errorMessages;
                } else if (error.message) {
                    errorMsg = error.message;
                } else if (error.data && error.data.message) {
                    errorMsg = error.data.message;
                }

                showMessage('registerMessage', errorMsg, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // Prevent authenticated users from accessing this page - redirect based on role
        if (isAuthenticated()) {
            const userData = getUserData();
            const userType = userData?.user_type || userData?.role || '';
            const isStaff = userData?.is_staff === true;
            const isSuperuser = userData?.is_superuser === true;

            if (userType === 'ADMIN' || userType === 'admin' || userType === 'STAFF' || isStaff || isSuperuser) {
                window.location.href = '../admin/pages/dashboard.html';
            } else {
                window.location.href = '../user/pages/dashboard.html';
            }
        }
    </script>
</body>

</html>
