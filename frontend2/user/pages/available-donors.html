<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodify - Available Donors</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-red: #E53935;
            --primary-red-dark: #C62828;
            --bg-dark-primary: #181A1E;
            --bg-dark-secondary: #1F2229;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --border-color: #333944;
            --success-green: #4CAF50;
            --warning-yellow: #FF9800;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-dark-primary);
            color: var(--text-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.loaded {
            opacity: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(31, 34, 41, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-red);
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary-red);
        }

        /* Main Content */
        .main-content {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .page-title p {
            color: var(--text-secondary);
        }

        /* Filters Section */
        .filters-container {
            background: var(--bg-dark-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-dark-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        .reset-filter-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
        }

        .reset-filter-btn:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
        }

        /* Donors Grid */
        .donors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .donor-card {
            background: var(--bg-dark-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .donor-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-red);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .donor-blood-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary-red);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(229, 57, 53, 0.3);
        }

        .donor-info h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-right: 60px;
        }

        .donor-meta {
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .meta-item i {
            color: var(--primary-red);
            width: 16px;
        }

        .donor-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-available {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-green);
        }

        .status-unavailable {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
        }

        .contact-donor-btn {
            width: 100%;
            padding: 12px;
            background: rgba(229, 57, 53, 0.1);
            border: 1px solid var(--primary-red);
            color: var(--primary-red);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .contact-donor-btn:hover {
            background: var(--primary-red);
            color: white;
        }

        /* States */
        .loading-state,
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 0;
            color: var(--text-secondary);
        }

        .loading-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-red);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <a href="dashboard.html" class="logo">
            <i class="fa-solid fa-droplet"></i> Bloodify
        </a>
        <div class="header-actions">
            <a href="dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <div class="page-title">
                <h1>Available Donors</h1>
                <p>Browse and find blood donors in your area.</p>
            </div>
        </header>

        <!-- Filters -->
        <section class="filters-container">
            <div class="filter-group">
                <label for="bloodGroupFilter">Blood Group</label>
                <select id="bloodGroupFilter">
                    <option value="">All Groups</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="cityFilter">Search City</label>
                <input type="text" id="cityFilter" placeholder="Enter city name...">
            </div>
            <button class="reset-filter-btn" id="resetFilters">
                <i class="fa-solid fa-rotate-left"></i> Reset
            </button>
        </section>

        <!-- Donors Grid -->
        <div class="donors-grid" id="donorsGrid">
            <div class="loading-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>Loading donors...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <i class="fa-solid fa-heart" style="color: var(--primary-red);"></i>
        Bloodify - Helping Each Other | 2024
    </footer>

    <!-- Scripts -->
    <script src="../../config/api-config.js"></script>
    <script src="../../js/main.js"></script>
    <script src="../js/available-donors.js"></script>
</body>

</html>
