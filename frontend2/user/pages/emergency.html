<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodfy - Emergency Search</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-red: #E53935;
            /* Emergency Red is slightly brighter */
            --primary-red-dark: #C62828;
            --bg-dark-primary: #121212;
            --glass-bg: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --font-family: 'Poppins', sans-serif;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            display: flex;
            background-color: var(--bg-dark-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 15px;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        .sidebar-header .logo {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary-red);
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 15px 0;
        }

        .sidebar-nav ul li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            font-size: 1rem;
            padding: 16px 30px;
            margin: 6px 15px;
            border-radius: 10px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .sidebar-nav ul li a i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-nav ul li a:hover,
        .sidebar-nav ul li.active a {
            background-color: var(--primary-red);
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .main-content {
            flex-grow: 1;
            width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
        }

        /* --- EMERGENCY SPECIFIC --- */
        /* Map Container (Hero Section) */

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
            /* Takes up top half */
            background-color: #242f3e;
            /* Dark map fallback */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg');
            /* Placeholder Map Image */
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Dark Overlay on Map for "Tech" feel */

        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.6);
        }

        /* Floating Search Panel (UC Requirement: Quick Search) */

        .search-panel {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 350px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .search-panel h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #FF5252;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .custom-select,
        .custom-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: var(--font-family);
        }

        .btn-emergency {
            width: 100%;
            padding: 12px;
            background: #D50000;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(213, 0, 0, 0.5);
            transition: 0.3s;
        }

        .btn-emergency:hover {
            background: #FF1744;
            box-shadow: 0 0 25px rgba(255, 23, 68, 0.6);
        }

        /* Map Markers (Visual) */

        .map-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(229, 57, 53, 0.2);
            border: 2px solid #E53935;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #E53935;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        .map-marker i {
            font-size: 1.2rem;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(229, 57, 53, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(229, 57, 53, 0);
            }
        }

        /* Results Section (Bottom Half) */

        .results-section {
            flex-grow: 1;
            padding: 30px 40px;
            background: var(--bg-dark-primary);
            border-top: 1px solid var(--glass-border);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
        }

        .donor-result-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-dark-secondary);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .donor-result-card:hover {
            border-color: var(--primary-red);
            transform: translateX(5px);
        }

        .donor-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .donor-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary-red);
            border: 2px solid var(--glass-border);
        }

        .dist-badge {
            background: rgba(41, 98, 255, 0.15);
            color: #2962FF;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-top: 5px;
            display: inline-block;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-call {
            background: #00C853;
        }

        .btn-call:hover {
            background: #00E676;
            box-shadow: 0 0 10px rgba(0, 200, 83, 0.4);
        }

        .btn-sms {
            background: #2962FF;
        }

        .btn-sms:hover {
            background: #448AFF;
            box-shadow: 0 0 10px rgba(41, 98, 255, 0.4);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <!-- Logo removed as per user request -->
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="active"><a href="emergency.html"><i class="fas fa-ambulance"></i> Emergency</a></li>
                <li><a href="requests.html"><i class="fa-solid fa-hand-holding-medical"></i> My Requests</a></li>
                <li><a href="chatbot.html"><i class="fas fa-robot"></i> Chatbot</a></li>
                <li><a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>
                <li><a href="settings.html"><i class="fas fa-user-cog"></i> Settings</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer"><a href="#" data-action="logout"><i class="fa-solid fa-right-from-bracket"></i>
                Logout</a></div>
    </aside>

    <div class="main-content">

        <div class="map-wrapper">
            <div class="map-overlay"></div>

            <div class="search-panel">
                <h2><i class="fa-solid fa-bolt"></i> Quick Find</h2>
                <form id="emergencySearchForm">
                    <div class="input-group">
                        <label>Blood Group Required</label>
                        <select class="custom-select" id="emergencyBloodGroup" required>
                            <option value="">Select Blood Group</option>
                            <option value="A+">A Positive (A+)</option>
                            <option value="A-">A Negative (A-)</option>
                            <option value="B+">B Positive (B+)</option>
                            <option value="B-">B Negative (B-)</option>
                            <option value="AB+">AB Positive (AB+)</option>
                            <option value="AB-">AB Negative (AB-)</option>
                            <option value="O+">O Positive (O+)</option>
                            <option value="O-">O Negative (O-)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Location / City</label>
                        <input type="text" id="emergencyLocation" class="custom-input" placeholder="Enter city name..."
                            required>
                    </div>
                    <button type="submit" id="btnSearchEmergency" class="btn-emergency">Search Donors</button>
                </form>
            </div>

        </div>

        <div class="results-section">
            <div class="results-header">
                <h3>Nearest Active Donors (Sorted by Distance)</h3>
                <span style="color: var(--text-secondary);">Search for donors to see results</span>
            </div>

            <!-- Results will be dynamically inserted here by emergency.js -->

        </div>
    </div>

    <!-- API Configuration -->
    <script src="../../config/api-config.js"></script>

    <!-- Main Integration Script -->
    <script src="../../js/main.js"></script>

    <!-- Emergency Search Script -->
    <script src="../../js/emergency.js"></script>

</body>

</html>
