<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodfy - My Requests</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-red: #c62828;
            --primary-red-dark: #b71c1c;
            --bg-dark-primary: #121212;
            --glass-bg: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --font-family: 'Poppins', sans-serif;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            display: flex;
            background-color: var(--bg-dark-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 15px;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        .sidebar-header .logo {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary-red);
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 15px 0;
        }

        .sidebar-nav ul li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            font-size: 1rem;
            padding: 16px 30px;
            margin: 6px 15px;
            border-radius: 10px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .sidebar-nav ul li.active a {
            background-color: var(--primary-red);
            color: var(--text-primary);
        }

        .main-content {
            flex-grow: 1;
            width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .requests-main {
            padding: 40px;
            flex-grow: 1;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-add {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .widget {
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 0;
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: 400px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 1fr 1fr;
            padding: 20px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        #requestsTableBody {
            min-height: 200px;
        }

        .request-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 1fr 1fr;
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            align-items: center;
            transition: background 0.2s;
        }

        .request-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .status-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: rgba(255, 171, 0, 0.1);
            color: #FFAB00;
        }

        .status-progress {
            background: rgba(41, 98, 255, 0.1);
            color: #2962FF;
        }

        .status-completed {
            background: rgba(0, 200, 83, 0.1);
            color: #00C853;
        }

        .btn-table {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-right: 5px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Error Banner */
        #js-error-banner {
            display: none;
            background: #ff5252;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10001;
        }
    </style>
</head>

<body>
    <div id="js-error-banner">
        ⚠️ <strong>JavaScript Error:</strong> <span id="js-error-msg">Unknown error</span>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <!-- Logo removed as per user request -->
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="emergency.html"><i class="fa-solid fa-truck-medical"></i> Emergency</a></li>
                <li class="active"><a href="requests.html"><i class="fa-solid fa-hand-holding-medical"></i> My
                        Requests</a></li>
                <li><a href="chatbot.html"><i class="fa-solid fa-robot"></i> AI Chatbot</a></li>
                <li><a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid var(--glass-border);">
            <a href="#" data-action="logout" style="color: var(--text-secondary); text-decoration: none;"><i
                    class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </aside>

    <div class="main-content" id="main-content">
        <header class="header">
            <h2>Track Your Requests</h2>
            <div class="admin-profile">
                <span class="userName" id="headerUserName" style="font-weight: 500;">User</span>
            </div>
        </header>

        <main class="requests-main">
            <div class="page-header">
                <h2>My Blood Requests</h2>
                <button id="btnAddRequest" class="btn-add"><i class="fa-solid fa-plus"></i> Request Blood</button>
            </div>

            <div class="widget">
                <div class="table-header">
                    <div>Patient / Reason</div>
                    <div>Blood Group</div>
                    <div>Hospital</div>
                    <div>Status</div>
                    <div>Actions</div>
                </div>
                <div id="requestsTableBody">
                    <!-- LOADING STATE -->
                    <div id="table-loading-spinner"
                        style="text-align:center; padding:80px; color:var(--text-secondary);">
                        <i class="fas fa-spinner fa-spin"
                            style="font-size: 2.5rem; margin-bottom: 15px; color: var(--primary-red);"></i>
                        <p>Connecting to server...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- INLINE DEBUG SCRIPT -->
    <script>
        window.addEventListener('error', function (e) {
            const banner = document.getElementById('js-error-banner');
            const msg = document.getElementById('js-error-msg');
            if (banner && msg) {
                banner.style.display = 'block';
                msg.textContent = e.message + ' at ' + e.filename + ':' + e.lineno;
            }
        });

        // Fail-safe: if nothing happens after 5 seconds, show error
        setTimeout(() => {
            const spinner = document.getElementById('table-loading-spinner');
            if (spinner && spinner.style.display !== 'none') {
                const container = document.getElementById('requestsTableBody');
                if (container && container.innerHTML.includes('Connecting')) {
                    container.innerHTML = `
                        <div style="padding: 40px; text-align: center; color: #ff5252;">
                            <i class="fas fa-plug" style="font-size: 3rem; margin-bottom: 20px;"></i>
                            <h3>Unable to load data</h3>
                            <p>The server connection is taking too long or a script failed. Please try refreshing.</p>
                            <button onclick="location.reload()" style="margin-top:20px; padding:8px 16px; background:var(--primary-red); color:white; border:none; border-radius:4px; cursor:pointer;">Refresh Page</button>
                        </div>
                    `;
                }
            }
        }, 8000);
    </script>

    <!-- API Configuration -->
    <script src="../../config/api-config.js"></script>
    <script>
        // Check if API loaded
        if (typeof API === 'undefined') {
            const banner = document.getElementById('js-error-banner');
            const msg = document.getElementById('js-error-msg');
            banner.style.display = 'block';
            msg.textContent = 'CRITICAL: API configuration (api-config.js) failed to load.';
        }
    </script>

    <!-- Main Integration Script -->
    <script src="../../js/main.js"></script>

    <!-- Patients/Requests Script -->
    <script src="../../js/patients.js"></script>

    <script>
        // Check if Patients JS loaded
        if (typeof initializePatientPage === 'undefined') {
            console.error('patients.js not loaded properly');
        }
    </script>
</body>

</html>
